<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PlantCare AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🌿 PlantCare AI</h2>

    <input type="file" id="fileInput">

    <br>

    <button onclick="predict()">Predict</button>

    <div class="result" id="result"></div>

    <img id="gradcamImg" />
</div>

<script>
async function predict() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Pilih gambar dulu!");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("https://plantcare-backend-b8ad.onrender.com/predict", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <p><b>Prediction:</b> ${data.prediction}</p>
        <p><b>Confidence:</b> ${data.confidence}</p>
    `;

    document.getElementById("gradcamImg").src = data.gradcam_url;
}
</script>

</body>
</html>
